<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studioers AI | Visual Engine</title>
    <style>
        /* STUDIOERS DARK THEME v2.0 */
        :root {
            --primary: #00ff88;
            --bg: #0a0a0b;
            --surface: #111113;
            --border: #1f1f23;
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', system-ui, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }

        .box { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            padding: 35px; 
            border-radius: 28px; 
            width: 100%; 
            max-width: 480px; 
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
        }

        h1 { 
            font-size: 28px; 
            background: linear-gradient(135deg, var(--primary), #00bdff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-weight: 800;
        }

        p.subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }

        .input-group { position: relative; margin-bottom: 20px; }

        input { 
            width: 90%; 
            padding: 16px; 
            background: #000; 
            border: 2px solid #1f1f23; 
            color: #fff; 
            border-radius: 14px; 
            outline: none; 
            transition: 0.4s;
            font-size: 16px;
            text-align: center;
        }

        input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 20px rgba(0,255,136,0.15); 
        }

        button { 
            background: var(--primary); 
            color: #000; 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 900; 
            width: 98%; 
            font-size: 15px;
            letter-spacing: 1px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,255,136,0.3); }
        button:active { transform: scale(0.96); }

        #res-container { 
            margin-top: 30px; 
            min-height: 320px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            border: 2px dashed var(--border); 
            border-radius: 20px; 
            overflow: hidden;
            background: #000;
            position: relative;
        }

        img { width: 100%; height: auto; border-radius: 18px; display: none; }
        
        .loading { 
            display: none; 
            color: var(--primary); 
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            font-size: 14px; 
            text-transform: uppercase;
        }

        .loading::after {
            content: "";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ""; }
            40% { content: "."; }
            60% { content: ".."; }
            80%, 100% { content: "..."; }
        }

        .footer { margin-top: 30px; font-size: 11px; color: #333; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>STUDIOERS <span style="color:#fff">AI</span></h1>
        <p class="subtitle">Imagination to Pixels Engine</p>
        
        <div class="input-group">
            <input type="text" id="promptInput" placeholder="Write in English (e.g. Cyberpunk Dog)">
        </div>
        
        <button onclick="generateImage()">GENERATE PIXELS</button>
        
        <div id="res-container">
            <div id="loader" class="loading">Processing Pixels</div>
            <img id="outputImage" alt="Studioers AI Image Result">
        </div>
        
        <div class="footer">STABLE DIFFUSION FLUX ENGINE</div>
    </div>

    <script>
        function generateImage() {
            const promptField = document.getElementById('promptInput');
            const loader = document.getElementById('loader');
            const img = document.getElementById('outputImage');
            const prompt = promptField.value.trim();

            if(!prompt) {
                alert("Please enter a prompt first!");
                return;
            }

            // UI Reset
            loader.style.display = 'block';
            img.style.display = 'none';
            console.log("Generating for: " + prompt);

            // Random seed ensures a new image every time
            const seed = Math.floor(Math.random() * 9999999);
            
            // Fast & Reliable API URL
            const apiUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&seed=${seed}&nologo=true&model=flux`;

            // Setup Image Loading
            img.crossOrigin = "anonymous"; // Bypass potential CORS issues
            img.src = apiUrl;

            img.onload = function() {
                loader.style.display = 'none';
                img.style.display = 'block';
                console.log("Pixels gathered successfully.");
            };

            img.onerror = function() {
                loader.style.display = 'none';
                alert("Connection glitch! Try again or check your internet.");
                console.error("Image load failed.");
            };
        }

        // Enter key support
        document.getElementById('promptInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                generateImage();
            }
        });
    </script>

</body>
</html>
