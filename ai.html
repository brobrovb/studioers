<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studioers AI | Art Generation Engine</title>
    <style>
        :root {
            --accent: #00ff88;
            --bg: #0a0a0b;
            --surface: #111113;
            --text: #ffffff;
            --gray: #666;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }

        .box { 
            background: var(--surface); 
            border: 1px solid #1f1f23; 
            padding: 40px; 
            border-radius: 32px; 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); 
        }

        h1 { 
            font-size: 32px; 
            background: linear-gradient(135deg, var(--accent), #00bdff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .subtitle { 
            color: var(--gray); 
            font-size: 13px; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        input { 
            width: 90%; 
            padding: 18px; 
            background: #000; 
            border: 2px solid #1f1f23; 
            color: #fff; 
            border-radius: 16px; 
            outline: none; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 16px;
            margin-bottom: 15px;
        }

        input:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 20px rgba(0,255,136,0.1); 
        }

        .btn-generate { 
            background: var(--accent); 
            color: #000; 
            border: none; 
            padding: 18px; 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: 800; 
            width: 100%; 
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px rgba(0,255,136,0.2);
        }

        .btn-download { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 14px; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 700; 
            width: 100%; 
            margin-top: 25px;
            display: none; 
            transition: 0.3s;
        }

        #res-container { 
            margin-top: 30px; 
            min-height: 350px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px dashed #1f1f23; 
            border-radius: 24px; 
            background: #000;
            position: relative;
            overflow: hidden;
        }

        img { width: 100%; height: auto; border-radius: 22px; display: none; }
        
        .loading { 
            display: none; 
            color: var(--accent); 
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .footer { 
            margin-top: 50px; 
            color: #222; 
            font-size: 11px; 
            letter-spacing: 4px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>STUDIOERS <span style="color:#fff">AI</span></h1>
        <p class="subtitle">Next-Gen Image Synthesis</p>
        
        <input type="text" id="prompt" placeholder="Describe your vision (e.g. Neon Samurai)...">
        <button class="btn-generate" onclick="generate()">Generate Art</button>
        
        <div id="res-container">
            <div id="loader" class="loading">SYNCING PIXELS...</div>
            <img id="result" alt="Studioers AI Generation">
        </div>

        <button id="dlBtn" class="btn-download" onclick="download()">Download Artwork</button>
    </div>

    <p class="footer">STUDIOERS.XYZ // 2026</p>

    <script>
        async function generate() {
            const prompt = document.getElementById('prompt').value.trim();
            const loader = document.getElementById('loader');
            const img = document.getElementById('result');
            const dlBtn = document.getElementById('dlBtn');

            if(!prompt) return alert("Please enter a description first!");

            // UI Reset
            loader.style.display = 'block';
            img.style.display = 'none';
            dlBtn.style.display = 'none';

            const seed = Math.floor(Math.random() * 9999999);
            // Using Flux model for high-end results
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&nologo=true&model=flux`;

            img.src = url;

            img.onload = () => {
                loader.style.display = 'none';
                img.style.display = 'block';
                dlBtn.style.display = 'block';
            };

            img.onerror = () => {
                loader.style.display = 'none';
                alert("Generation failed. Please check your connection.");
            };
        }

        async function download() {
            try {
                const img = document.getElementById('result');
                const response = await fetch(img.src);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `StudioersAI_${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            } catch (err) {
                alert("Download failed. Try right-clicking the image.");
            }
        }

        // Enter key support
        document.getElementById('prompt').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generate();
        });
    </script>

</body>
</html>
