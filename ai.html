<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studioers AI | Art Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00ff88;
            --bg: #0a0a0b;
            --surface: #111113;
            --text: #ffffff;
            --gray: #666;
            --border: #1f1f23;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }

        .nav-header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .btn-home {
            text-decoration: none;
            color: var(--gray);
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .btn-home:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .box { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            padding: 35px; 
            border-radius: 28px; 
            width: 100%; 
            max-width: 460px; 
            text-align: center; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); 
        }

        h1 { 
            font-size: 32px; 
            background: linear-gradient(135deg, var(--accent), #00bdff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            font-weight: 800;
            letter-spacing: -1.5px;
        }

        .subtitle { 
            color: var(--gray); 
            font-size: 11px; 
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        input { 
            width: calc(100% - 32px); 
            padding: 16px; 
            background: #000; 
            border: 2px solid var(--border); 
            color: #fff; 
            border-radius: 14px; 
            outline: none; 
            transition: 0.3s;
            font-size: 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        input:focus { border-color: var(--accent); }

        .btn-generate { 
            background: var(--accent); 
            color: #000; 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 800; 
            width: 100%; 
            font-size: 15px;
            transition: 0.3s;
        }

        #res-container { 
            margin-top: 25px; 
            min-height: 320px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px dashed var(--border); 
            border-radius: 24px; 
            background: #000;
            overflow: hidden;
        }

        img { width: 100%; height: auto; border-radius: 20px; display: none; }
        
        .loading { 
            display: none; 
            color: var(--accent); 
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .btn-download { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 14px; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 800; 
            width: 100%; 
            margin-top: 20px;
            display: none; 
            font-size: 13px;
        }

        .footer { margin-top: 40px; color: #1a1a1c; font-size: 10px; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="btn-home">← BACK TO HOME</a>
    </div>

    <div class="box">
        <h1>STUDIOERS <span style="color:#fff">AI</span></h1>
        <p class="subtitle">Fast Generation Engine</p>
        
        <input type="text" id="prompt" placeholder="Describe anything (e.g. Neon City)...">
        <button class="btn-generate" onclick="generate()">GENERATE ART</button>
        
        <div id="res-container">
            <div id="loader" class="loading">SYNCING PIXELS...</div>
            <img id="result" alt="AI Generation">
        </div>

        <button id="dlBtn" class="btn-download" onclick="download()">DOWNLOAD (PNG)</button>
    </div>

    <p class="footer">STUDIOERS.XYZ // 2026</p>

    <script>
        function generate() {
            const prompt = document.getElementById('prompt').value.trim();
            const loader = document.getElementById('loader');
            const img = document.getElementById('result');
            const dlBtn = document.getElementById('dlBtn');

            if(!prompt) return alert("Enter a prompt!");

            loader.style.display = 'block';
            img.style.display = 'none';
            dlBtn.style.display = 'none';

            const seed = Math.floor(Math.random() * 999999);
            // 512px resolution for maximum stability & speed
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&seed=${seed}&nologo=true`;

            // Reset image and try to load
            img.src = ""; 
            img.src = url;

            img.onload = () => {
                loader.style.display = 'none';
                img.style.display = 'block';
                dlBtn.style.display = 'block';
            };

            img.onerror = () => {
                loader.style.display = 'none';
                alert("Connection glitch. The AI server might be busy. Please try again!");
            };
        }

        async function download() {
            try {
                const img = document.getElementById('result');
                const response = await fetch(img.src);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `StudioersAI_${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (err) {
                alert("Use long-press or right-click to save.");
            }
        }

        document.getElementById('prompt').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generate();
        });
    </script>

</body>
</html>
