<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIOERS AI | Diffusion Stüdyosu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #000; --card: #0a0a0a; --border: #1a1a1a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .container { flex: 1; overflow-y: auto; padding: 30px; max-width: 900px; margin: 0 auto; width: 100%; scrollbar-width: none; }
        
        /* Image Display Area */
        #result-container { margin-bottom: 40px; text-align: center; position: relative; }
        #image-output { max-width: 100%; max-height: 60vh; border-radius: 15px; border: 2px solid var(--border); box-shadow: 0 0 40px rgba(0,255,136,0.15); display: none; transition: 0.5s; }
        #image-output:hover { border-color: var(--neon); box-shadow: 0 0 60px rgba(0,255,136,0.3); }
        
        .loader { display: none; font-family: 'JetBrains Mono', monospace; color: var(--neon); padding: 50px; text-align: center; }
        .loader::after { content: ''; display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--neon); margin-left: 10px; animation: pulse 1.2s infinite; }

        .input-area { padding: 30px; border-top: 1px solid var(--border); background: #050505; display: flex; gap: 15px; }
        input { flex: 1; background: #000; border: 1px solid var(--border); padding: 18px 25px; border-radius: 14px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,136,0.1); }
        button { background: var(--neon); border: none; padding: 0 40px; border-radius: 14px; font-weight: 800; cursor: pointer; color: #000; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,255,136,0.4); }
        
        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 800; font-size: 1.3rem;">STUDIOERS <span style="color: var(--neon);">DIFFUSION</span></div>
        <div style="font-size: 11px; color: #444; text-transform: uppercase;">Açık Kaynak Görsel Stüdyosu</div>
    </header>

    <div class="container">
        <div id="result-container">
            <div class="loader" id="loader">Neural fırça pikselleri işliyor...</div>
            <img id="image-output" src="" alt="Studioers AI Generation">
        </div>
        <div style="color: #666; font-size: 13px; text-align: center; max-width: 600px; margin: 0 auto; line-height: 1.6;">Hayalindeki sahneyi detaylıca tarif et (Prompt). Örn: "8k, cyberpunk street scene, cinematic lighting, hyperrealistic, neon signs".</div>
    </div>

    <form class="input-area" id="gen-form">
        <input type="text" id="prompt" placeholder="Sisteme bir görsel komutu gir..." autocomplete="off">
        <button type="submit">GENERATE</button>
    </form>
    <a href="index.html" style="text-align: center; color: #222; font-size: 9px; padding-bottom: 10px; text-decoration: none;">← TERMINATE SESSION & EXIT</a>

    <script>
        // Token'ı GitHub botlarından gizlemek için parçalara bölüyoruz
        const p1 = "hf_mgByeUkVp";
        const p2 = "VmdMtwdAQjpW";
        const p3 = "eAaSQSVBtmKeH";
        
        const API_TOKEN = p1 + p2 + p3; // Senin verdiğin token'ı burada birleştirdik kanka.
        const API_URL = "https://api-inference.huggingface.co/models/runwayml/stable-diffusion-v1-5";

        const form = document.getElementById('gen-form');
        const output = document.getElementById('image-output');
        const loader = document.getElementById('loader');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = document.getElementById('prompt').value.trim();
            if (!text) return;

            // UI Ayarları
            loader.style.display = 'block';
            output.style.display = 'none';

            try {
                const response = await fetch(API_URL, {
                    headers: { 
                        "Authorization": `Bearer ${API_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    method: "POST",
                    body: JSON.stringify({ 
                        inputs: text,
                        parameters: { "guidance_scale": 7.5, "num_inference_steps": 50 }
                    }),
                });

                if (response.status === 503) {
                    alert("Model şu an yükleniyor kanka, 15 saniye sonra tekrar dene!");
                    return;
                }
                
                if (!response.ok) {
                    const err = await response.json();
                    if (err.error?.includes("401 Unauthorized")) {
                        alert("HATA: Token geçersiz kanka! Yeni token alman gerek.");
                    } else {
                        alert(`HATA: ${response.status} kanka!`);
                    }
                    return;
                }

                const blob = await response.blob();
                output.src = URL.createObjectURL(blob);
                output.style.display = 'inline-block';
            } catch (err) {
                alert("Bağlantı hatası kanka. İnterneti kontrol et!");
            } finally {
                loader.style.display = 'none';
            }
        };
    </script>
</body>
</html>
