<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studioers AI | Art Engine</title>
    <style>
        :root {
            --accent: #00ff88;
            --bg: #0a0a0b;
            --surface: #111113;
            --text: #ffffff;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }

        .box { 
            background: var(--surface); 
            border: 1px solid #1f1f23; 
            padding: 35px; 
            border-radius: 30px; 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.7); 
        }

        h1 { 
            font-size: 32px; 
            background: linear-gradient(135deg, var(--accent), #00bdff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            font-weight: 900;
        }

        .subtitle { color: #666; font-size: 13px; margin-bottom: 25px; letter-spacing: 1px; }

        input { 
            width: 90%; 
            padding: 16px; 
            background: #000; 
            border: 2px solid #1f1f23; 
            color: #fff; 
            border-radius: 15px; 
            outline: none; 
            transition: 0.3s;
            font-size: 16px;
            margin-bottom: 15px;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,255,136,0.1); }

        .btn-generate { 
            background: var(--accent); 
            color: #000; 
            border: none; 
            padding: 16px; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: 800; 
            width: 100%; 
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-generate:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .btn-download { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            width: 100%; 
            margin-top: 20px;
            display: none; /* Başta gizli */
            transition: 0.3s;
        }

        #res-container { 
            margin-top: 30px; 
            min-height: 300px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px dashed #1f1f23; 
            border-radius: 20px; 
            background: #000;
            position: relative;
            overflow: hidden;
        }

        img { width: 100%; border-radius: 18px; display: none; }
        
        .loading { 
            display: none; 
            color: var(--accent); 
            font-family: monospace;
            font-weight: bold;
        }

        .footer { margin-top: 40px; color: #333; font-size: 10px; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>STUDIOERS <span style="color:#fff">AI</span></h1>
        <p class="subtitle">POWERED BY FLUX ENGINE</p>
        
        <input type="text" id="prompt" placeholder="İngilizce hayal et (örn: astronaut cat)...">
        <button class="btn-generate" onclick="generate()">GÖRSELİ ÜRET</button>
        
        <div id="res-container">
            <div id="loader" class="loading">PIKSELLER ISLENIYOR...</div>
            <img id="result" alt="AI Output">
        </div>

        <button id="dlBtn" class="btn-download" onclick="download()">BİLGİSAYARA İNDİR</button>
    </div>

    <p class="footer">STUDIOERS.XYZ | 2026</p>

    <script>
        async function generate() {
            const prompt = document.getElementById('prompt').value.trim();
            const loader = document.getElementById('loader');
            const img = document.getElementById('result');
            const dlBtn = document.getElementById('dlBtn');

            if(!prompt) return alert("Kanka bir şeyler yazman lazım!");

            // UI Reset
            loader.style.display = 'block';
            img.style.display = 'none';
            dlBtn.style.display = 'none';

            const seed = Math.floor(Math.random() * 999999);
            // En hızlı ve kaliteli sonuç için Flux modeli + 512px
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&seed=${seed}&nologo=true&model=flux`;

            img.src = url;

            img.onload = () => {
                loader.style.display = 'none';
                img.style.display = 'block';
                dlBtn.style.display = 'block'; // Görsel gelince indir butonu gelsin
            };

            img.onerror = () => {
                loader.style.display = 'none';
                alert("Hata oluştu kanka, bir daha dene!");
            };
        }

        async function download() {
            const img = document.getElementById('result');
            const response = await fetch(img.src);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `studioers_ai_${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        // Enter tuşu ile üretim
        document.getElementById('prompt').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generate();
        });
    </script>

</body>
</html>
