<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIOERS AI | Neural Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #000; --card: #0a0a0a; --border: #1a1a1a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .chat-frame { width: 100%; max-width: 800px; display: flex; flex-direction: column; border-left: 1px solid var(--border); border-right: 1px solid var(--border); background: #000; }
        
        header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .ai-status { color: var(--accent); font-size: 11px; letter-spacing: 2px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); animation: blink 1.5s infinite; }

        #chat-window { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 15px; font-size: 14px; line-height: 1.6; }
        .ai { background: var(--card); border: 1px solid var(--border); color: var(--accent); align-self: flex-start; border-bottom-left-radius: 2px; font-family: 'JetBrains Mono', monospace; }
        .user { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 700; }

        .input-box { padding: 25px; background: #050505; border-top: 1px solid var(--border); display: flex; gap: 15px; }
        input { flex: 1; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,255,136,0.1); }
        button { background: var(--accent); border: none; padding: 0 30px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; color: #000; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,136,0.3); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="chat-frame">
        <header>
            <div style="font-weight: 800; font-size: 1.2rem; letter-spacing: -1px;">STUDIOERS <span style="color:var(--accent)">AI</span></div>
            <div class="ai-status"><div class="dot"></div> MISTRAL-7B NEURAL LINK</div>
        </header>

        <div id="chat-window">
            <div class="msg ai">Sistem bağlantısı doğrulandı. Ben Studioers'ın açık kaynaklı zekasıyım. Android (Compose), Godot veya dijital gelir sistemleri hakkında neyi simüle edelim kanka?</div>
        </div>

        <form id="chat-form" class="input-box">
            <input type="text" id="user-input" placeholder="Sisteme bir komut gir..." autocomplete="off">
            <button type="submit">EXECUTE</button>
        </form>
        <a href="index.html" style="text-align: center; color: #333; font-size: 10px; padding-bottom: 15px; text-decoration: none;">← TERMINATE SESSION</a>
    </div>

    <script>
        const API_URL = "https://api-inference.huggingface.co/models/MistralAI/Mistral-7B-v0.1";
        const API_TOKEN = "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";

        const chatForm = document.getElementById('chat-form');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        async function query(data) {
            const response = await fetch(API_URL, {
                headers: { 
                    "Authorization": `Bearer ${API_TOKEN}`,
                    "Content-Type": "application/json"
                },
                method: "POST",
                body: JSON.stringify(data),
            });
            return await response.json();
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            userInput.value = '';
            
            const loadingMsg = addMsg('Neural ağ taranıyor...', 'ai');

            try {
                // Modeli Studioers bağlamına sokmak için prompt düzenlemesi
                const prompt = `System: Sen Studioers.xyz asistanısın. Yazılım, Android, Godot ve dijital para kazanma konularında uzman bir kankasın. Kısa ve öz cevap ver. User: ${text} AI:`;
                
                const response = await query({ 
                    "inputs": prompt,
                    "parameters": {"max_new_tokens": 150, "return_full_text": false}
                });

                let aiResponse = response[0]?.generated_text || "Bağlantı zaman aşımına uğradı kanka.";
                // Fazladan gelen AI: etiketini temizle
                loadingMsg.innerText = aiResponse.replace("AI:", "").trim();
                
            } catch (err) {
                loadingMsg.innerText = "Sistem hatası. Token veya model limitine takılmış olabiliriz kanka.";
                console.error(err);
            }
        };

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
