title: Studioers
email: coinkriptobilgi@gmail.com
description: >- 
  Digital Revenue Blueprint & No-Code Engineering.
url: "https://studioers.xyz"
baseurl: ""

# Menüde görünecek sayfaları manuel yönetmek istersen burayı kullanabilirsin
header_pages:
  - studioblast.md
  - ai-art.md

  # En stabil ve hatasız tema
theme: minima

encoding: "utf-8"

# Markdown ayarları
markdown: kramdown
highlighter: rouge

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
exclude:
  - Gemfile
  - Gemfile.lock
  - admin/
  - node_modules/
  - vendor/

# Stil SCSS'i okuması için ayarlar
sass:
  sass_dir: _sass
  style: compressed
