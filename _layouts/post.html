---
layout: default
---
<article class="post">
  <h1>{{ page.title }}</h1>

  {% if page.image %}
    <div class="post-featured-image" style="margin-bottom: 20px;">
      <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" style="width: 100%; border-radius: 15px; box-shadow: 0px 4px 15px rgba(0,0,0,0.1);">
    </div>
  {% endif %}

  {{ content }}
  <div id="cusdis_thread"
  data-host="https://cusdis.com"
  data-app-id="34cdca1d-0366-46e0-87e6-63cc7633281f"
  data-page-id="{{ page.url }}"
  data-page-url="{{ site.url }}{{ page.url }}"
  data-page-title="{{ page.title }}"
></div>
<script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
  <div class="share-buttons" style="margin-top: 50px; padding: 20px; border-top: 1px solid #eee;">
  <h4 style="margin-bottom: 15px;">Bu rehberi arkadaşlarınla paylaş:</h4>
  
  <!-- WhatsApp -->
  <a href="https://api.whatsapp.com/send?text={{ page.title | url_encode }} - {{ site.url }}{{ page.url }}" target="_blank" style="margin-right: 15px; color: #25D366; text-decoration: none; font-size: 24px;">
    <b>WhatsApp</b>
  </a>

  <!-- X (Twitter) -->
  <a href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}&url={{ site.url }}{{ page.url }}" target="_blank" style="margin-right: 15px; color: #000; text-decoration: none; font-size: 24px;">
    <b>X</b>
  </a>

  <!-- Facebook -->
  <a href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ page.url }}" target="_blank" style="margin-right: 15px; color: #1877F2; text-decoration: none; font-size: 24px;">
    <b>Facebook</b>
  </a>

  <!-- Instagram & TikTok (Profil Linki Yönlendirmesi) -->
  <span style="font-size: 14px; color: #666; display: block; margin-top: 10px;">
    Instagram ve TikTok'ta paylaşmak için linki kopyalayıp hikayene ekleyebilirsin !
  </span>
</div>
</article>
