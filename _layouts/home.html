---
layout: default
---

<!-- index.md içindeki Jokerli, tanıtımlı kısmı buraya basar -->
{{ content }}

<hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

<h3 style="color: #1565c0; margin-bottom: 30px;">📝 Son Yazılar</h3>

<ul class="post-list" style="padding: 0; list-style: none;">
  {% for post in site.posts %}
    <li style="margin-bottom: 40px;">
      <span style="color: #999; font-size: 0.85rem;">{{ post.date | date: "%d %B %Y" }}</span>
      
      <h2 style="margin: 5px 0 10px 0;">
        <a href="{{ post.url | relative_url }}" style="text-decoration: none; color: #1565c0; font-size: 1.6rem; font-weight: bold;">
          {{ post.title }}
        </a>
      </h2>

      <!-- SEO ve Kullanıcı Deneyimi İçin Özet -->
      <p style="color: #444; line-height: 1.7; font-size: 1rem; margin-bottom: 10px;">
        {{ post.excerpt | strip_html | truncatewords: 30 }}
      </p>

      <a href="{{ post.url | relative_url }}" style="color: #1565c0; font-weight: bold; text-decoration: none; font-size: 0.9rem;">
        Devamını Oku →
      </a>
    </li>
  {% endfor %}
</ul>
