backend:
  name: github
  repo: brobrovb/studioers # Kullanıcı adın ve repo ismin
  branch: main # Ana dalın main olduğu varsayıldı
  base_url: https://studioers.xyz # Domain bağlantın için kritik

# Görsel yönetimi
media_folder: "assets/images" # Temalarla çakışmaması için assets altına almak daha güvenlidir
public_folder: "/assets/images"

collections:
  - name: "blog"
    label: "Blog Yazıları"
    folder: "_posts" # Jekyll'ın tanıdığı standart klasör
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: true
    fields:
      - { label: "Başlık", name: "title", widget: "string" }
      - { label: "Yayın Tarihi", name: "date", widget: "datetime" }
      - { label: "Özet/Açıklama", name: "description", widget: "string", required: false }
      - { label: "Kapak Görseli", name: "image", widget: "image", required: false }
      - { label: "İçerik", name: "body", widget: "markdown" }
