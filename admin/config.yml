backend:
  name: github
  repo: brobrovb/studioers
  branch: main
  # Statik GitHub Pages üzerinde login olabilmen için 
  # açık kaynaklı bir auth-gateway kullanıyoruz.
  base_url: https://pizzatime.herokuapp.com 
  auth_endpoint: /auth
  site_id: Ov23li1uWfHPLEoMsjMo # Senin Client ID buraya

# Görsel yönetimi
media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "blog"
    label: "Blog Yazıları"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: true
    fields:
      - { label: "Başlık", name: "title", widget: "string" }
      - { label: "Yayın Tarihi", name: "date", widget: "datetime" }
      - { label: "Özet/Açıklama", name: "description", widget: "string", required: false }
      - { label: "Kapak Görseli", name: "image", widget: "image", required: false }
      - { label: "İçerik", name: "body", widget: "markdown" }
