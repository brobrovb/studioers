<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | STUDIOERS Engineering</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #000000; --card: #0a0a0a; --border: #1a1a1a; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .contact-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 255, 136, 0.05);
        }
        .logo-icon { 
            width: 40px; height: 40px; 
            background: linear-gradient(135deg, var(--accent), #00aaff); 
            border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; font-weight: 800; color: #000; margin-bottom: 20px;
        }
        h2 { margin: 0 0 10px 0; font-size: 1.8rem; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; letter-spacing: 1px; }
        
        input, textarea {
            width: 100%;
            background: #111;
            border: 1px solid var(--border);
            padding: 12px 15px;
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; background: #161616; }
        
        button {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3); }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: #444; font-size: 12px; text-decoration: none; transition: 0.3s; }
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div class="contact-card">
        <div class="logo-icon">S</div>
        <h2>Get in Touch</h2>
        <p>Software inquiries, collaboration, or just to say hi to Joker.</p>

        <form action="https://formspree.io/f/mnjldpol" method="POST">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label>Your Email</label>
                <input type="email" name="_replyto" placeholder="email@example.com" required>
            </div>
            
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="4" placeholder="How can we help?" required></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>

        <a href="index.html" class="back-link">← Back to Ecosystem</a>
    </div>

</body>
</html>
