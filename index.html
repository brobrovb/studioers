<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="3v-dwgR_03wM3wWci6lWpWoqjjbpuBLlp27pDnS8hbY" />

    <title>STUDIOERS | Advanced AI Solutions & Android Development</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00ff88; --bg: #000000; --card: #0a0a0a; --border: #1a1a1a; }
        * { box-sizing: border-box; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        a { text-decoration: none; color: inherit; }

        .hero-section {
            position: relative; width: 100%; min-height: 70vh; display: flex; flex-direction: column;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,1) 100%), 
                        url('https://public-files.gumroad.com/ya39cdpadopl1829j234roh1a0gu');
            background-size: cover; background-position: center; border-bottom: 1px solid var(--border);
        }

        .nav-container { max-width: 1100px; width: 100%; margin: 0 auto; padding: 30px 20px; display: flex; align-items: center; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), #00aaff); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #000; box-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .logo-text { font-size: 22px; font-weight: 800; margin-left: 12px; letter-spacing: -1px; text-transform: uppercase; }

        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }
        .section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); margin-bottom: 40px; display: block; }

        /* Technology Stack Grid */
        .stack-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 25px; 
            margin-bottom: 80px; 
        }
        .stack-item { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 35px 20px; 
            border-radius: 24px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .stack-item:hover {
            border-color: var(--accent);
            background: #111;
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.05);
        }
        .stack-logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
            /* Resimlerin hepsi beyaz/gri tonlarında başlasın diye */
            filter: grayscale(1) brightness(1.2);
            transition: 0.4s;
        }
        .stack-item:hover .stack-logo {
            filter: grayscale(0) brightness(1);
            transform: scale(1.1);
        }
        .stack-name {
            font-weight: 700;
            color: #555;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.3s;
        }
        .stack-item:hover .stack-name {
            color: #fff;
        }

        /* Mobile Experiences & Cards (Önceki kodlardan korunmuştur) */
        .apps-showcase { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 60px; }
        .store-button { background: #111; border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .store-button:hover { border-color: var(--accent); transform: translateY(-3px); }
        .store-icon { width: 40px; height: 40px; }
        .store-text span:last-child { font-size: 18px; font-weight: 800; }

        footer { text-align: center; padding: 60px 20px; border-top: 1px solid var(--border); color: #444; font-size: 13px; }
    </style>
</head>
<body>

    <section class="hero-section">
        <header class="nav-container">
            <div class="logo-icon">S</div>
            <div class="logo-text">STUDIOERS</div>
        </header>
        <div style="max-width: 1100px; margin: auto; padding: 0 20px; width: 100%;">
            <h1 style="font-size: clamp(3rem, 8vw, 5rem); font-weight: 800; line-height: 1;">Next-Gen<br><span style="color: var(--accent)">Software Ecosystem</span></h1>
        </div>
    </section>

    <main class="container">
        
        <span class="section-label">Mobile Experiences</span>
        <div class="apps-showcase">
            <a href="https://play.google.com/store/apps/details?id=com.studioers.notdefteri" target="_blank" class="store-button">
                <img src="https://www.vectorlogo.zone/logos/google_play/google_play-icon.svg" alt="Play" class="store-icon">
                <div class="store-text"><span>GET IT ON</span><br><span>Google Play</span></div>
            </a>
            <a href="https://studioers.gumroad.com/l/ubsxdc" target="_blank" class="store-button">
                <svg class="store-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="35" y="10" width="30" height="30" rx="4" fill="#00ff88"/>
                    <rect x="35" y="42" width="30" height="30" rx="4" fill="#00ff88"/>
                    <rect x="3" y="42" width="30" height="30" rx="4" fill="#00aaff"/>
                    <rect x="67" y="42" width="30" height="30" rx="4" fill="#00aaff"/>
                </svg>
                <div class="store-text"><span>DOWNLOAD APK</span><br><span>ProTetris Game</span></div>
            </a>
        </div>

        <span class="section-label">Our Technology Stack</span>
        <div class="stack-grid">
            <div class="stack-item">
                <img src="https://www.vectorlogo.zone/logos/android/android-icon.svg" alt="Android SDK" class="stack-logo">
                <span class="stack-name">Android SDK</span>
            </div>
            <div class="stack-item">
                <img src="https://www.vectorlogo.zone/logos/kotlinlang/kotlinlang-icon.svg" alt="Kotlin" class="stack-logo">
                <span class="stack-name">Kotlin</span>
            </div>
            <div class="stack-item">
                <img src="https://www.gstatic.com/lamda/images/favicon_v1_150160d13063548773.svg" alt="Gemini AI" class="stack-logo">
                <span class="stack-name">Gemini AI</span>
            </div>
            <div class="stack-item">
                <img src="https://www.vectorlogo.zone/logos/godotengine/godotengine-icon.svg" alt="Godot" class="stack-logo">
                <span class="stack-name">Godot Engine</span>
            </div>
            <div class="stack-item">
                <img src="https://www.vectorlogo.zone/logos/android_jetpack/android_jetpack-icon.svg" alt="Compose" class="stack-logo">
                <span class="stack-name">Compose</span>
            </div>
            <div class="stack-item">
                <img src="https://www.vectorlogo.zone/logos/python/python-icon.svg" alt="Python" class="stack-logo">
                <span class="stack-name">Python</span>
            </div>
        </div>

    </main>

    <footer>
        &copy; 2026 STUDIOERS / High-Performance Software Development
    </footer>

</body>
</html>
