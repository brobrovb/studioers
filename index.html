<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Studioers</title>
</head>
<body>
  <h1>Studioers Blog</h1>
  <p><a href="/admin">Admin Panel</a></p>

  <div id="content"></div>

  <script>
    fetch('https://api.github.com/repos/brobrovb/studioers/contents/_posts')
      .then(res => res.json())
      .then(data => {
        const el = document.getElementById('content');
        data.forEach(post => {
          let p = document.createElement("p");
          p.innerHTML = `<a href="${post.download_url}" target="_blank">${post.name}</a>`;
          el.appendChild(p);
        });
      });
  </script>
</body>
</html>
